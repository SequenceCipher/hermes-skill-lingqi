name: Test and Validate Prompt Optimizer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'

jobs:
  test-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run validation tests
        run: |
          echo "Running check_prompt_artifact.py..."
          python3 scripts/check_prompt_artifact.py SKILL.md
          echo "Running score_prompt_shape.py..."
          python3 scripts/score_prompt_shape.py SKILL.md
      
      - name: Validate SKILL.md structure
        run: |
          grep -q "^---$" SKILL.md && echo "✓ Frontmatter exists"
          grep -q "^name:" SKILL.md && echo "✓ Name field exists"
          grep -q "^version:" SKILL.md && echo "✓ Version field exists"
  
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Scan for sensitive data
        run: |
          echo "Scanning for secrets..."
          if grep -r "ghp_" scripts/ SKILL.md 2>/dev/null; then
            echo "ERROR: Potential token found!"
            exit 1
          fi
          echo "✓ No secrets detected"
